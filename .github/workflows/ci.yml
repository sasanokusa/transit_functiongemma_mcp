name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  deterministic-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install lightweight test dependencies
        run: python -m pip install --requirement requirements-ci.txt

      - name: Run deterministic tests
        run: python -m pytest -q

      - name: Validate evaluation datasets
        run: python evaluation/validate_eval_datasets.py

      - name: Verify checked-in MCP schema
        run: python scripts/fetch_tools.py --check
