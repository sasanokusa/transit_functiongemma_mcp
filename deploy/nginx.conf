server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static UI assets must never be cached aggressively.
    location ~* \.(?:html|css|js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Proxy the JSON API to the colocated Python container.
    # app.js calls "api/health" / "api/query"; strip the /api/ prefix.
    location /api/ {
        proxy_pass http://127.0.0.1:8091/;
        proxy_set_header Host $host;
        # Routing requests chain several sequential CPU model calls on the Pi
        # (~30-45s each), so a full route can take minutes. Allow up to 10 min.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
