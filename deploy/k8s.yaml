apiVersion: v1
kind: Namespace
metadata:
  name: transit
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transit-functiongemma
  namespace: transit
  labels:
    app: transit-functiongemma
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: transit-functiongemma
  template:
    metadata:
      labels:
        app: transit-functiongemma
    spec:
      # Image is pre-imported into containerd on ict5403-2 (reachable node, 4GB).
      nodeSelector:
        kubernetes.io/hostname: ict5403-2
      containers:
        - name: api
          image: transit-functiongemma-api:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8091
          env:
            - name: MCP_ENDPOINT
              value: https://api.transit.ls8h.com/mcp
            - name: FUNCTIONGEMMA_THREADS
              value: "4"
            # Set to "1" to enable int8 dynamic quantization (faster + lighter,
            # but shifts some tool-call outputs on this 270M model).
            - name: FUNCTIONGEMMA_QUANTIZE
              value: "0"
          volumeMounts:
            - name: infer-override
              mountPath: /app/infer.py
              subPath: infer.py
          resources:
            requests:
              cpu: "500m"
              memory: "1500Mi"
            limits:
              memory: "3Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 120
            periodSeconds: 30
        - name: web
          image: transit-functiongemma-web:local
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-override
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: infer-override
          configMap:
            name: transit-infer
        - name: nginx-override
          configMap:
            name: transit-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: transit-functiongemma
  namespace: transit
spec:
  type: NodePort
  selector:
    app: transit-functiongemma
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
